<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JR Engenharia — Plataforma de Vistorias Técnicas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============ DESIGN TOKENS — JR ENGENHARIA ============ */
  :root {
    --ink:#1A1A18;
    --paper:#F0EDE6;
    --paper-2:#E8E3D8;
    --paper-3:#DDD7C8;
    --blueprint:#8A6A1A;
    --blueprint-soft:#F5EDD0;
    --redline:#C4962A;
    --redline-soft:#FAF0D7;
    --graphite:#6B6860;
    --line: rgba(26,26,24,0.12);
    --line-strong: rgba(26,26,24,0.22);
    --surface:#fff;
    --sidebar-bg:#111110;
    --sidebar-text:#F0EDE6;
    --topbar-bg:rgba(240,237,230,0.92);
    --shadow: 0 4px 24px -8px rgba(26,26,24,0.18);
    --transition-theme: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    --gold:#C4962A;
    --gold-bright:#E8B84B;
    --gold-soft:#FAF0D7;
  }
  [data-theme="dark"] {
    --ink:#F0EDE6;
    --paper:#111110;
    --paper-2:#1A1A16;
    --paper-3:#222220;
    --blueprint:#C4962A;
    --blueprint-soft:#2A2210;
    --redline:#E8B84B;
    --redline-soft:#2D2510;
    --graphite:#8A8780;
    --line: rgba(240,237,230,0.1);
    --line-strong: rgba(240,237,230,0.18);
    --surface:#1A1A16;
    --sidebar-bg:#0A0A09;
    --sidebar-text:#F0EDE6;
    --topbar-bg:rgba(17,17,16,0.92);
    --shadow: 0 4px 24px -8px rgba(0,0,0,0.6);
    --gold:#E8B84B;
    --gold-bright:#F5CC6A;
    --gold-soft:#2A2210;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    transition: var(--transition-theme);
  }
  h1,h2,h3,.display{ font-family:'Space Grotesk', sans-serif; font-weight:600; letter-spacing:-0.01em; margin:0; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  button{font-family:inherit;}
  img,svg{display:block;max-width:100%;}

  /* ============ FADE-IN ANIMATION ============ */
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; }
    to   { opacity:1; }
  }
  .stage-enter {
    animation: fadeInUp 0.35s cubic-bezier(0.22,1,0.36,1) both;
  }
  .stage-enter-child {
    animation: fadeInUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }
  .stage-enter-child:nth-child(1) { animation-delay: 0.04s; }
  .stage-enter-child:nth-child(2) { animation-delay: 0.09s; }
  .stage-enter-child:nth-child(3) { animation-delay: 0.14s; }
  .stage-enter-child:nth-child(4) { animation-delay: 0.19s; }

  /* ============ SHELL ============ */
  .shell{ display:grid; grid-template-columns:240px 1fr; min-height:100vh; }
  @media (max-width:860px){ .shell{grid-template-columns:1fr;} }

  /* ============ SIDEBAR ============ */
  .sidebar{
    background:var(--sidebar-bg);
    color:var(--sidebar-text);
    padding:24px 18px;
    display:flex;
    flex-direction:column;
    gap:28px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    transition: background-color 0.3s ease, transform 0.35s cubic-bezier(0.22,1,0.36,1);
    z-index:50;
  }
  /* Mobile: sidebar becomes slide-over drawer */
  @media (max-width:860px){
    .sidebar{
      position:fixed;
      left:0; top:0; bottom:0;
      width:260px;
      transform:translateX(-100%);
      box-shadow:4px 0 32px rgba(0,0,0,0.35);
    }
    .sidebar.open{ transform:translateX(0); }
    .sidebar-overlay{
      display:none;
      position:fixed;inset:0;
      background:rgba(0,0,0,0.45);
      z-index:40;
    }
    .sidebar-overlay.show{ display:block; }
  }

  .logo{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:17px;
    display:flex;
    align-items:center;
    gap:10px;
    letter-spacing:0.01em;
  }
  .logo-icon{
    width:34px; height:34px;
    border-radius:50%;
    background: linear-gradient(145deg, #C4962A, #E8B84B);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    box-shadow: 0 2px 8px rgba(196,150,42,0.4);
  }
  .logo-icon svg{ width:20px; height:20px; }
  .logo-text{ display:flex; flex-direction:column; gap:0; }
  .logo-name{ font-size:15px; font-weight:700; color:#F0EDE6; letter-spacing:0.04em; line-height:1; }
  .logo-sub{ font-family:'IBM Plex Mono',monospace; font-size:8.5px; color:#C4962A; letter-spacing:0.12em; text-transform:uppercase; line-height:1; margin-top:3px; }
  .logo .mark{ display:none; }
  .demo-badge{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    color:#C4962A;
    border:1px solid rgba(196,150,42,0.3);
    padding:4px 8px;
    border-radius:2px;
    display:inline-block;
    letter-spacing:0.04em;
  }
  .stage-nav{ display:flex; flex-direction:column; gap:2px; }
  .menu-btn{
    text-align:left;
    background:none;
    border:none;
    color:#9AA39F;
    padding:12px 14px;
    border-radius:2px;
    font-size:14px;
    font-family:'IBM Plex Sans', sans-serif;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:10px;
    transition:all .15s ease;
    width: 100%;
  }
  .menu-btn:hover{ background:rgba(237,234,225,0.06); color:#DCD8CC; }
  .menu-btn.active{ background:rgba(237,234,225,0.09); color:#F7F5EF; border-left:3px solid var(--gold,#C4962A); font-weight:600; }
  .menu-btn:disabled{ opacity:0.35; cursor:not-allowed; }


  /* ============ TOPBAR ============ */
  .topbar{
    height:56px;
    border-bottom:1px solid var(--line-strong);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px 0 24px;
    background:var(--topbar-bg);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    position:sticky; top:0; z-index:10;
    transition: var(--transition-theme);
  }
  .topbar-left{ display:flex; align-items:center; gap:12px; }
  .topbar .proj{ font-size:13.5px; color:var(--graphite); }
  .topbar .proj b{ color:var(--ink); }

  /* Mobile hamburger */
  .hamburger{
    display:none;
    background:none;
    border:1px solid var(--line-strong);
    border-radius:2px;
    padding:7px 10px;
    cursor:pointer;
    color:var(--ink);
    font-size:16px;
    line-height:1;
  }
  @media (max-width:860px){ .hamburger{ display:flex; align-items:center; } }

  /* ============ THEME TOGGLE ============ */
  .theme-toggle{
    display:flex;
    align-items:center;
    gap:6px;
    background:none;
    border:1px solid var(--line-strong);
    border-radius:2px;
    padding:7px 12px;
    cursor:pointer;
    font-size:12px;
    color:var(--graphite);
    transition:all .15s ease;
    white-space:nowrap;
    flex-shrink:0;
  }
  .theme-toggle:hover{ border-color:var(--ink); color:var(--ink); }
  .theme-toggle .icon{ font-size:13px; }

  /* ============ TOAST ============ */
  .toast{
    position:fixed; top:20px; right:20px; z-index:200;
    background:var(--sidebar-bg); color:var(--sidebar-text);
    padding:14px 18px; border-radius:2px; font-size:13.5px;
    border-left:3px solid var(--redline);
    transform:translateX(140%); transition:transform .35s cubic-bezier(0.22,1,0.36,1);
    max-width:320px;
    box-shadow: var(--shadow);
  }
  .toast.show{ transform:translateX(0); }

  main{ padding:36px 28px 60px; max-width:1180px; }

  /* ============ GENERIC BITS ============ */
  .btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 18px; border-radius:2px; font-size:13.5px; font-weight:500;
    cursor:pointer; border:1px solid transparent; transition:all .15s ease; background:none;
  }
  .btn-primary{ background:var(--ink); color:var(--paper); }
  .btn-primary:hover{ background:var(--redline); }
  .btn-primary:disabled{ background:var(--graphite); opacity:0.5; cursor:not-allowed; }
  .btn-ghost{ border-color:var(--line-strong); color:var(--ink); }
  .btn-ghost:hover{ border-color:var(--ink); }
  .btn-sm{ padding:6px 12px; font-size:12.5px; }

  .panel{
    background:var(--surface);
    border:1px solid var(--line-strong);
    border-radius:2px;
    transition: var(--transition-theme);
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--graphite); margin-bottom:10px; display:flex; align-items:center; gap:8px;
  }
  .eyebrow::before{ content:""; width:16px; height:1px; background:var(--redline); }

  .stage-head{ margin-bottom:24px; }
  .stage-head h2{ font-size:22px; }
  .stage-head p{ color:var(--graphite); font-size:14px; margin-top:6px; max-width:560px; }

  /* ============ STAGE: UPLOAD ============ */
  .drop-zone{
    border:1.5px dashed var(--line-strong);
    border-radius:3px;
    padding:64px 24px;
    text-align:center;
    background:var(--paper-2);
    transition:all .2s ease;
  }
  .drop-zone.active{ border-color:var(--blueprint); background:var(--blueprint-soft); }
  .drop-zone h3{ font-size:19px; margin-bottom:8px; }
  .drop-zone p{ color:var(--graphite); font-size:14px; margin:0 0 20px; }
  .file-types{ display:flex; gap:8px; justify-content:center; margin-top:18px; flex-wrap:wrap; }
  .file-types span{
    font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--graphite);
    border:1px solid var(--line-strong); padding:4px 9px; border-radius:2px;
  }
  .upload-summary{
    margin-top:20px; padding:16px 20px; background:var(--paper-3); border-radius:2px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;
    transition: var(--transition-theme);
  }

  /* ============ STAGE: PROCESSING (enhanced) ============ */
  .progress-track{ height:6px; background:var(--paper-3); border-radius:3px; overflow:hidden; margin:20px 0; }
  .progress-fill{ height:100%; background:var(--redline); width:0%; transition:width .5s cubic-bezier(0.22,1,0.36,1); }
  .log-list{ font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--graphite); display:flex; flex-direction:column; gap:7px; }
  .log-list .done{ color:var(--ink); }
  .log-list .done::before{ content:"✓  "; color:var(--blueprint); }
  .log-list .active-step{ color:var(--ink); }
  .log-list .active-step::before{ content:""; display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--redline); margin-right:8px; animation:pulse 1s ease-in-out infinite; vertical-align:middle; }
  .log-list .pending::before{ content:"·  "; }

  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.5; transform:scale(0.7); }
  }

  /* Photo scanning grid */
  .scan-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(72px,1fr));
    gap:6px;
    margin-top:20px;
  }
  .scan-cell{
    aspect-ratio:4/3;
    border-radius:2px;
    overflow:hidden;
    position:relative;
    border:1px solid var(--line-strong);
    background:var(--paper-3);
    transition: all 0.3s ease;
  }
  .scan-cell img{ width:100%; height:100%; object-fit:cover; opacity:0.6; transition:opacity 0.3s; }
  .scan-cell.scanning{ border-color:var(--blueprint); box-shadow:0 0 0 2px var(--blueprint-soft); }
  .scan-cell.scanning img{ opacity:0.9; }
  .scan-cell.scanning::after{
    content:'';
    position:absolute; left:0; top:0; right:0; bottom:0;
    background:linear-gradient(180deg, transparent 0%, rgba(47,95,118,0.4) 50%, transparent 100%);
    animation:scanLine 1.1s ease-in-out infinite;
  }
  .scan-cell.done{ border-color:var(--redline); }
  .scan-cell.done img{ opacity:1; }
  .scan-cell.done::after{
    content:'✓';
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; color:var(--redline);
    background:rgba(var(--surface-rgb,255,255,255),0.7);
    animation: fadeIn 0.3s ease;
  }
  [data-theme="dark"] .scan-cell.done::after{
    background:rgba(30,35,38,0.75);
  }

  @keyframes scanLine{
    0%   { transform:translateY(-100%); }
    100% { transform:translateY(200%); }
  }

  .processing-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--graphite);
    text-align:center;
    margin-top:14px;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }

  /* ============ STAGE: CHECKPOINT ============ */
  .ckpt-legend{ display:flex; gap:20px; flex-wrap:wrap; margin-bottom:18px; font-size:12px; color:var(--graphite); }
  .ckpt-legend span{ display:flex; align-items:center; gap:6px; }
  .ckpt-swatch{ width:12px; height:12px; border-radius:2px; display:inline-block; }
  .ckpt-strip{ display:flex; flex-wrap:wrap; align-items:center; gap:0; padding:20px; background:var(--surface); border:1px solid var(--line-strong); border-radius:2px; }
  .ckpt-thumb{ width:64px; height:48px; border-radius:2px; overflow:hidden; border:1px solid var(--line-strong); flex:0 0 auto; }
  .ckpt-thumb img{ width:100%; height:100%; object-fit:cover; }
  .ckpt-divider{ flex:0 0 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; width:26px; align-self:stretch; cursor:pointer; position:relative; }
  .ckpt-divider .line{ width:0; border-left:1.5px dashed var(--line-strong); flex:1; }
  .ckpt-divider.suggested .line{ border-left-color:var(--blueprint); }
  .ckpt-divider.confirmed .line{ border-left:2px solid var(--redline); }
  .ckpt-btn{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:20px; height:20px; border-radius:50%; border:1px solid var(--line-strong); background:var(--surface);
    font-size:12px; line-height:1; display:flex; align-items:center; justify-content:center; color:var(--graphite);
    cursor:pointer; transition:all .15s ease;
  }
  .ckpt-divider.suggested .ckpt-btn{ border-color:var(--blueprint); color:var(--blueprint); }
  .ckpt-divider.confirmed .ckpt-btn{ background:var(--redline); border-color:var(--redline); color:#fff; }
  .ckpt-tooltip{
    position:absolute; bottom:100%; left:50%; transform:translateX(-50%); margin-bottom:6px;
    font-family:'IBM Plex Mono', monospace; font-size:10px; white-space:nowrap; padding:3px 7px; border-radius:2px;
    background:var(--sidebar-bg); color:var(--sidebar-text); opacity:0; pointer-events:none; transition:opacity .12s ease;
    z-index:20;
  }
  .ckpt-divider:hover .ckpt-tooltip{ opacity:1; }
  .ckpt-status{ display:flex; justify-content:space-between; align-items:center; margin-top:20px; flex-wrap:wrap; gap:12px; }
  .ckpt-status .mono{ font-size:13px; }
  .ckpt-warn{ font-size:12.5px; color:var(--redline); background:var(--redline-soft); padding:10px 14px; border-radius:2px; margin-top:14px; }

  /* ============ STAGE: ORGANIZE ============ */
  .org-layout{ display:grid; grid-template-columns:220px 1fr; gap:24px; align-items:start; }
  @media (max-width:760px){ .org-layout{grid-template-columns:1fr;} }
  .tree{ font-size:13.5px; }
  .tree .node{ padding:7px 10px; border-radius:2px; cursor:pointer; color:var(--graphite); transition:all .12s ease; }
  .tree .node:hover{ background:var(--paper-2); }
  .tree .node.active{ background:var(--paper-2); color:var(--ink); font-weight:500; }
  .tree .apt{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--ink); margin:12px 0 4px; }
  .tree .room{ padding-left:16px; }

  .room-section{ margin-bottom:30px; }
  .room-section-head{
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 12px; background:var(--paper-3); border-radius:2px; margin-bottom:12px;
    transition: var(--transition-theme);
  }
  .room-section-head h4{ font-size:14px; font-family:'Space Grotesk',sans-serif; }
  .room-section-head .count{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--graphite); }
  .room-section.dragover{ outline:2px dashed var(--blueprint); outline-offset:4px; }

  .thumb-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr)); gap:12px; }
  .thumb{
    border:1px solid var(--line-strong); border-radius:2px; overflow:hidden; background:var(--surface); cursor:grab;
    transition:box-shadow .15s ease, opacity .15s ease, transform .15s ease;
  }
  .thumb:hover{ box-shadow: var(--shadow); transform:translateY(-2px); }
  .thumb.excluded{ opacity:0.35; }
  .thumb .frame{ aspect-ratio:4/3; position:relative; }
  .thumb .frame img{ width:100%; height:100%; object-fit:cover; }
  .thumb .badge{
    position:absolute; top:6px; left:6px; font-family:'IBM Plex Mono', monospace; font-size:9.5px;
    background:rgba(28,35,33,0.8); color:#F0EEE5; padding:2px 6px; border-radius:2px; letter-spacing:0.03em;
  }
  .thumb .badge.dup{ background:var(--redline); }
  .thumb .badge.marked{ background:var(--blueprint); }
  .thumb .meta{ padding:8px 9px; font-size:11.5px; }
  .thumb .meta .id{ font-family:'IBM Plex Mono', monospace; color:var(--graphite); font-size:10px; display:block; margin-bottom:4px;}
  .thumb .actions{ display:flex; gap:6px; padding:0 9px 9px; }
  .thumb select{ font-size:10.5px; border:1px solid var(--line-strong); border-radius:2px; padding:3px 4px; flex:1; font-family:'IBM Plex Sans',sans-serif; background:var(--surface); color:var(--ink); }
  .thumb .x-btn{ border:1px solid var(--line-strong); background:none; border-radius:2px; font-size:10.5px; padding:3px 7px; cursor:pointer; color:var(--graphite); transition:all .12s ease; }
  .thumb .x-btn:hover{ border-color:var(--redline); color:var(--redline); }
  .hint-bar{
    font-size:12.5px; color:var(--graphite); background:var(--blueprint-soft); padding:10px 14px; border-radius:2px; margin-bottom:20px;
    transition: var(--transition-theme);
  }

  /* ============ STAGE: MARKUP ============ */
  .mk-layout{ display:grid; grid-template-columns:200px 1fr 260px; gap:20px; align-items:start; }
  @media (max-width:1000px){ .mk-layout{grid-template-columns:1fr;} }
  .mk-list{ display:flex; flex-direction:column; gap:6px; max-height:640px; overflow:auto; }
  .mk-list-item{
    display:flex; gap:8px; align-items:center; padding:6px; border-radius:2px; cursor:pointer; border:1px solid transparent;
    transition:all .12s ease;
  }
  .mk-list-item img{ width:38px; height:30px; object-fit:cover; border-radius:2px; }
  .mk-list-item span{ font-size:11.5px; }
  .mk-list-item.active{ border-color:var(--blueprint); background:var(--blueprint-soft); }
  .mk-list-item .ok{ margin-left:auto; color:var(--blueprint); font-size:12px; }

  .toolbar{ display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .tool-btn{
    border:1px solid var(--line-strong); background:var(--surface); padding:8px 12px; border-radius:2px; cursor:pointer; font-size:12.5px;
    display:flex; align-items:center; gap:6px; color:var(--ink); transition:all .12s ease;
  }
  .tool-btn.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .canvas-wrap{ position:relative; width:100%; max-width:560px; border:1px solid var(--line-strong); border-radius:2px; overflow:hidden; background:var(--surface); }
  .canvas-wrap canvas{ display:block; width:100%; height:auto; cursor:crosshair; }

  .caption-panel .field{ margin-bottom:14px; }
  .caption-panel label{ display:block; font-size:11.5px; font-family:'IBM Plex Mono', monospace; text-transform:uppercase; letter-spacing:0.05em; color:var(--graphite); margin-bottom:6px; }
  .caption-panel input{ width:100%; padding:9px 10px; border:1px solid var(--line-strong); border-radius:2px; font-size:13.5px; font-family:'IBM Plex Sans',sans-serif; background:var(--surface); color:var(--ink); transition: var(--transition-theme); }
  .caption-panel input:focus{ outline:none; border-color:var(--blueprint); }
  .caption-out{
    margin-top:16px; padding:14px; background:var(--paper-2); border-left:2px solid var(--blueprint); font-size:13px; min-height:40px;
    transition: var(--transition-theme);
  }
  .caption-out .lbl{ display:block; font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--blueprint); text-transform:uppercase; margin-bottom:6px; letter-spacing:0.06em; }
  .principle-note{ font-size:11.5px; color:var(--graphite); margin-top:10px; line-height:1.5; }

  /* ============ STAGE: REPORT ============ */
  .report-toolbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }

  .stat-strip{ display:flex; gap:28px; margin-bottom:24px; flex-wrap:wrap; }

  /* ============ MOBILE RESPONSIVO ============ */

    /* Topbar compacta */

    /* Drop zone mobile */
    .drop-zone{ padding:40px 16px; }

    .drop-zone p{ font-size:13px; }

    .upload-summary .btn{ width:100%; justify-content:center; }

    /* Processing: scan grid maior no mobile */

    /* Checkpoint strip: scroll horizontal */

    .ckpt-status .btn{ width:100%; justify-content:center; }
    .ckpt-legend{ gap:10px; font-size:11px; }

    /* Organize: layout coluna unica */
    .org-layout{ grid-template-columns:1fr; gap:16px; }

    .tree .node{ padding:6px 12px; border:1px solid var(--line-strong); border-radius:20px; font-size:12.5px; }
    .tree .node.active{ background:var(--redline); color:#fff; border-color:var(--redline); }
    .tree .apt{ display:none; }
    .tree .room{ padding-left:0; }

    /* Thumb grid: 2 colunas no mobile */

    .thumb .meta{ padding:6px 7px; }
    .thumb .meta .id{ font-size:9px; }
    .thumb .actions{ padding:0 7px 7px; gap:4px; }
    .thumb select{ font-size:9px; padding:2px 3px; }
    .thumb .x-btn{ font-size:9px; padding:2px 5px; }
    .hint-bar{ font-size:12px; }

    /* Room section */
    .room-section-head{ flex-wrap:wrap; gap:6px; }

    /* Markup: layout coluna unica */
    .mk-layout{ grid-template-columns:1fr; }
    .mk-list{
      flex-direction:row;
      flex-wrap:nowrap;
      overflow-x:auto;
      max-height:none;
      gap:8px;
      padding-bottom:8px;
      -webkit-overflow-scrolling:touch;
    }
    .mk-list-item{ flex-direction:column; min-width:80px; text-align:center; padding:8px 6px; }
    .mk-list-item img{ width:100%; height:50px; }
    .mk-list-item span{ font-size:10px; }
    .canvas-wrap{ max-width:100%; }
    .toolbar{ gap:4px; }
    .tool-btn{ padding:8px 10px; font-size:11.5px; }
    .caption-panel{ order:3; }

    /* Report */
    .report-grid{ grid-template-columns:repeat(2,1fr); gap:12px; }
    .stat-strip{ gap:16px; }
    .stat-strip .s .v{ font-size:20px; }
    .report-toolbar{ flex-direction:column; }
    .export-buttons{ flex-direction:column; }
    .export-buttons .btn{ width:100%; justify-content:center; }
    .warn-box{ font-size:12px; }

    /* Toast mobile */
    .toast{ right:10px; left:10px; max-width:none; font-size:13px; }

    /* Barra inferior fixa de etapa atual */
    .topbar-stage-mobile{
      display:flex;
      position:fixed;
      bottom:0; left:0; right:0;
      background:var(--sidebar-bg);
      color:var(--gold, #C4962A);
      font-family:'IBM Plex Mono', monospace;
      font-size:10.5px;
      letter-spacing:0.08em;
      text-transform:uppercase;
      padding:10px 16px;
      justify-content:center;
      z-index:30;
      border-top:1px solid rgba(196,150,42,0.2);
    }
  }

  @media (max-width:480px){
    .thumb-grid{ grid-template-columns:repeat(2,1fr); }
    .report-grid{ grid-template-columns:1fr; }

  /* ============ REPORT TYPE SELECTOR ============ */
  .report-type-card{

  }

    background:var(--paper); color:var(--ink); font-size:13.5px;
    font-family:'IBM Plex Sans',sans-serif; margin-top:8px; box-sizing:border-box;
  }

  /* ============ QUICK TAGS ============ */
  .qtags-label{ font-size:11.5px; color:var(--graphite); margin-bottom:6px; display:block; }

  .sev-btn.grave.active{ background:#FEE2E2; border-color:#DC2626; color:#991B1B; }
  [data-theme="dark"] .sev-btn.minima.active{ background:#064E3B; border-color:#10B981; color:#6EE7B7; }
  [data-theme="dark"] .sev-btn.media.active{ background:#451A03; border-color:#F59E0B; color:#FCD34D; }
  [data-theme="dark"] .sev-btn.grave.active{ background:#450A0A; border-color:#F87171; color:#FCA5A5; }

  /* ============ LIBRARY PANEL ============ */
  .field-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; }
  .btn-lib{
    background:none; cursor:pointer; color:var(--graphite);
    font-size:11px; padding:2px 7px; border-radius:2px;
    border:1px solid var(--line-strong); transition:all .15s ease; flex-shrink:0;
  }
  .btn-lib:hover{ color:var(--gold,#C4962A); border-color:var(--gold,#C4962A); }
  .lib-panel{
    background:var(--surface); border:1px solid var(--line-strong);
    border-radius:3px; max-height:180px; overflow-y:auto;
    margin-top:4px; box-shadow:var(--shadow); position:relative; z-index:20;
  }
  .lib-item{
    padding:9px 12px; font-size:12.5px; cursor:pointer;
    border-bottom:1px solid var(--line); color:var(--ink); transition:background .1s ease;
  }
  .lib-item:last-child{ border-bottom:none; }
  .lib-item:hover{ background:var(--paper-2); }
  .lib-item strong{ font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--gold,#C4962A); display:block; margin-bottom:2px; }

  /* ============ HISTORY HINT ============ */
  .history-hint{
    background:var(--blueprint-soft); border:1px solid var(--blueprint);
    border-radius:3px; padding:8px 10px; font-size:12px;
    display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:6px;
  }
  .reuse-btn{
    padding:3px 10px; border-radius:2px; background:var(--gold,#C4962A);
    color:#fff; border:none; cursor:pointer; font-size:11.5px; margin-left:auto; flex-shrink:0;
  }

  /* ============ RECOMMENDATION OUTPUT ============ */
  .rec-out{
    background:var(--blueprint-soft); border:1px solid var(--blueprint);
    border-left:3px solid var(--gold,#C4962A); border-radius:2px;
    padding:12px 14px; margin-top:10px; font-size:13px; color:var(--ink); display:none;
  }
  .rec-lbl{ font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--gold,#C4962A); display:block; margin-bottom:4px; letter-spacing:.06em; text-transform:uppercase; }

  /* ============ STATS DASHBOARD ============ */
  .stats-dash{
    background:var(--surface); border:1px solid var(--line-strong);
    border-radius:3px; padding:20px 24px; margin-bottom:24px; transition:var(--transition-theme);
  }
  .stats-dash-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:14px; }
  .bar-row{ display:flex; align-items:center; gap:10px; font-size:12px; margin-bottom:8px; }
  .bar-row label{ width:72px; flex-shrink:0; color:var(--graphite); }
  .bar-bg{ flex:1; height:8px; background:var(--paper-3); border-radius:4px; overflow:hidden; }
  .bar-fill{ height:100%; border-radius:4px; transition:width .7s cubic-bezier(.22,1,.36,1); min-width:3px; }
  .bar-fill.minima{ background:#059669; }
  .bar-fill.media{ background:#D97706; }
  .bar-fill.grave{ background:#DC2626; }
  .bar-cnt{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--graphite); width:18px; text-align:right; }
  .anomaly-cloud{ display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .atag{ padding:3px 9px; border-radius:20px; background:var(--paper-2); border:1px solid var(--line-strong); font-size:11.5px; color:var(--ink); }
  .atag b{ font-family:'IBM Plex Mono',monospace; color:var(--gold,#C4962A); }
  .room-list{ display:flex; flex-direction:column; gap:2px; }
  .room-row{ display:flex; justify-content:space-between; font-size:12.5px; padding:5px 0; border-bottom:1px solid var(--line); }
  .room-row:last-child{ border-bottom:none; }

  /* ============ STEP WIZARD ============ */
  .wizard-wrap {
    background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: 3px; padding: 18px 24px; margin-bottom: 16px;
    display: flex; justify-content: space-between; align-items: center;
    position: relative; overflow-x: auto; gap: 14px;
    flex-wrap: nowrap; transition: var(--transition-theme);
    -webkit-overflow-scrolling: touch;
  }
  .wizard-step {
    display: flex; flex-direction: row; align-items: center; justify-content: center;
    gap: 8px; flex: 0 0 auto; position: relative; cursor: pointer; z-index: 2; background: var(--surface);
    border: none; padding: 0 10px; color: var(--graphite); font-family: 'IBM Plex Sans', sans-serif;
    outline: none; transition: var(--transition-theme);
  }
  .wizard-step:disabled { cursor: not-allowed; opacity: 0.4; }
  .wizard-step .circle {
    width: 26px; height: 26px; border-radius: 50%;
    border: 1.5px solid var(--line-strong); background: var(--paper-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
    transition: all 0.2s ease; color: var(--graphite);
  }
  .wizard-step.active .circle {
    border-color: var(--gold,#C4962A); background: var(--gold,#C4962A);
    color: white; box-shadow: 0 0 0 3px rgba(196,150,42,0.18);
  }
  .wizard-step.completed .circle {
    border-color: var(--gold,#C4962A); background: var(--gold,#C4962A);
    color: white;
  }
  .wizard-step .label { font-size: 11.5px; font-weight: 500; white-space: nowrap; }
  .wizard-step.active .label { color: var(--ink); font-weight: 600; }
  
  .wizard-line {
    position: absolute; top: 50%; left: 40px; right: 40px;
    height: 2px; background: var(--line-strong); z-index: 1; transform: translateY(-50%);
  }
  .wizard-line-fill { height: 100%; background: var(--gold,#C4962A); width: 0%; transition: width 0.3s ease; }

  /* ============ WORKSPACE STATS BAR ============ */
  .card-stats-bar {
    display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: 3px; padding: 12px 20px; margin-bottom: 20px;
    align-items: center; flex-wrap: wrap; transition: var(--transition-theme);
  }
  .card-stat-item {
    font-size: 12.5px; color: var(--graphite); display: flex; align-items: center;
    gap: 6px; border-right: 1px solid var(--line-strong); padding-right: 14px;
  }
  .card-stat-item:last-child { border-right: none; padding-right: 0; }
  .card-stat-item b { font-family: 'IBM Plex Mono', monospace; color: var(--ink); font-size: 13.5px; }

  /* ============ LAUDO HISTORY SCREEN ============ */
  .history-container {
    background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: 3px; padding: 24px; margin-bottom: 24px;
    transition: var(--transition-theme);
  }
  .history-header { margin-bottom: 20px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
  .history-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .history-card {
    background: var(--paper-2); border: 1px solid var(--line-strong);
    border-radius: 3px; padding: 16px 20px; display: flex;
    justify-content: space-between; align-items: center;
    transition: all 0.2s ease;
  }
  .history-card:hover { border-color: var(--gold,#C4962A); transform: translateY(-1.5px); }
  .history-info { flex: 1; }
  .history-title { font-size: 16px; font-weight: 600; color: var(--ink); margin: 0 0 6px; }
  .history-meta { font-size: 12.5px; color: var(--graphite); display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .history-badge {
    background: var(--blueprint-soft); color: var(--blueprint);
    padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .history-badge.cautelar { background: rgba(196,150,42,0.12); color: var(--gold,#C4962A); }
  .history-badge.patologia { background: rgba(220,38,38,0.12); color: #DC2626; }
  .history-badge.inspecao { background: rgba(5,150,105,0.12); color: #059669; }
  .history-badge.locaticia { background: rgba(37,99,235,0.12); color: #2563EB; }
  .history-badge.status-ok { background: rgba(16,185,129,0.12); color: #10B981; }
  .history-badge.status-progress { background: rgba(245,158,11,0.12); color: #F59E0B; }
  .history-actions { display: flex; gap: 8px; }
  
  @media (max-width:860px) {
    .wizard-wrap { padding: 12px 14px; gap: 8px; flex-wrap: nowrap; display: flex !important; flex-direction: row !important; }
    .wizard-step { flex-direction: row !important; display: flex !important; flex: 0 0 auto !important; }
    .wizard-step .circle { width: 22px; height: 22px; font-size: 10px; margin-bottom: 0 !important; }
    .wizard-step .label { font-size: 10px; display: inline-block !important; }
    .wizard-line { top: 50% !important; left: 20px !important; right: 20px !important; transform: translateY(-50%) !important; }
    .history-card { flex-direction: column; align-items: flex-start; gap: 14px; }
    .history-actions { width: 100%; }
    .history-actions button { flex: 1; text-align: center; }
  }
</style>
</head>

<script>
/* =========================================================
   DATA MODEL
   ========================================================= */
const ROOM_META = {
  sala:      { label:'Sala',      prep:'sala' },
  cozinha:   { label:'Cozinha',   prep:'cozinha' },
  banheiro:  { label:'Banheiro',  prep:'banheiro' },
  quarto:    { label:'Quarto',    prep:'quarto' },
  sacada:    { label:'Sacada',    prep:'sacada' },
  fachada:   { label:'Fachada',   prep:'fachada' },
  garagem:   { label:'Garagem',   prep:'garagem' },
};
const PHOTO_TYPES = ['Foto geral','Foto de parede','Foto de piso','Foto de teto','Foto de detalhe'];

const APARTMENTS = [
  { id:'101', rooms:['sala','cozinha','banheiro','quarto'] },
  { id:'102', rooms:['sala','cozinha','banheiro'] },
  { id:'203', rooms:['quarto','banheiro','sacada'] },
  { id:'ÁREAS COMUNS', rooms:['fachada','garagem'], common:true },
];

/* Technical illustration SVGs per room */
function roomSVG(type){
  const paper='%23EDEAE1', paper2='%23E3DFD3', paper3='%23DAD5C6', line='%236B6F6D', ink='%231C2321', blue='%232F5F76';
  const wrap = (inner) => `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 480 360'>${inner}</svg>`;
  switch(type){
    case 'sala':
      return wrap(`<rect width='480' height='360' fill='${paper}'/><rect x='0' y='230' width='480' height='130' fill='${paper3}'/><rect x='300' y='40' width='140' height='140' fill='${paper2}' stroke='${line}'/><line x1='370' y1='40' x2='370' y2='180' stroke='${line}'/><line x1='300' y1='110' x2='440' y2='110' stroke='${line}'/><rect x='60' y='210' width='170' height='70' rx='8' fill='${paper3}' stroke='${ink}' stroke-width='2'/><rect x='70' y='190' width='40' height='30' rx='6' fill='${paper2}' stroke='${ink}'/><rect x='120' y='190' width='40' height='30' rx='6' fill='${paper2}' stroke='${ink}'/>`);
    case 'cozinha':

function buildPhotos(){
  PHOTOS = [];
  let seq = 800;
  APARTMENTS.forEach(apt=>{
    apt.rooms.forEach(room=>{
      const n = 3 + Math.floor(Math.random()*3);
      for(let i=0;i<n;i++){
        seq++;
        PHOTOS.push({
          id: `${apt.id}-${room}-${i}`,
          apt: apt.id,
          room: room,
          type: PHOTO_TYPES[i % PHOTO_TYPES.length],
          img: roomSVG(room),
          filename: `IMG_${seq}.HEIC`,
          duplicate: Math.random() < 0.12,
          excluded: false,
          marked: false,
          caption: null,
          annotations: [],
        });
      }
    });
  });
}

/* =========================================================
   THEME TOGGLE
   ========================================================= */
function initTheme(){
  const saved = localStorage.getItem('traco-theme') || 'light';
  applyTheme(saved);
}

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('traco-theme', theme);
  const icon = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if(icon) icon.textContent = theme === 'dark' ? '☽' : '☀';
  if(label) label.textContent = theme === 'dark' ? 'Escuro' : 'Claro';
}

document.getElementById('theme-toggle').addEventListener('click', ()=>{
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');

hamburger.addEventListener('click', ()=>{
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', ()=>{
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});

function closeSidebar(){
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> t.classList.remove('show'), 3200);
}

function updateSideStats(){
  const active = PHOTOS.filter(p=>!p.excluded);
  const rooms = new Set(active.map(p=>p.room));
  const totalEl = document.getElementById('s-total');
  const roomsEl = document.getElementById('s-rooms');
  const markedEl = document.getElementById('s-marked');
  const excludedEl = document.getElementById('s-excluded');
  if(totalEl) totalEl.textContent = PHOTOS.length ? PHOTOS.length : '0';
  if(roomsEl) roomsEl.textContent = rooms.size;
  if(markedEl) markedEl.textContent = `${active.filter(p=>p.marked).length}/${active.length}`;
  if(excludedEl) excludedEl.textContent = PHOTOS.filter(p=>p.excluded).length;
}

function setStageEnabled(stage){
  if(!STATE.enabledStages) STATE.enabledStages = ['upload'];

    STATE.enabledStages.push(stage);

  render();
}

function isStageEnabled(stage){
  if(!STATE.enabledStages) STATE.enabledStages = ['upload'];
  return STATE.enabledStages.includes(stage);
}

  // Else: laudos flow

function runProcessing(){
  const steps = ['exif','sim','rooms','dup','build'];
  const stepLabels = {
    exif:'Lendo metadados EXIF...',
    sim:'Agrupando por similaridade...',
    rooms:'Identificando ambientes com IA...',
    dup:'Detectando duplicadas...',
    build:'Montando relatório...'
  };
  let stepIdx = 0;
  let cellIdx = 0;
  const totalCells = document.querySelectorAll('.scan-cell').length;
  const cellsPerStep = Math.ceil(totalCells / steps.length);

  const iv = setInterval(()=>{
    if(STATE.stage !== 'processing'){ clearInterval(iv); return; }

    // Mark current step log
    const el = document.querySelector(`.log-list [data-key="${steps[stepIdx]}"]`);
    if(el){
      // un-active previous
      document.querySelectorAll('.log-list .active-step').forEach(e=>{ e.classList.remove('active-step'); e.classList.add('done'); });
      el.classList.remove('pending');
      el.classList.add('active-step');
    }

    // Update label
    const lbl = document.getElementById('processing-label');
    if(lbl) lbl.textContent = stepLabels[steps[stepIdx]];

    // Scan cells for this step
    const endCell = Math.min(cellIdx + cellsPerStep, totalCells);
    let delay = 0;
    for(let c = cellIdx; c < endCell; c++){
      const cell = document.getElementById(`scan-cell-${c}`);
      if(!cell) continue;
      ;(function(el, d){
        setTimeout(()=>{ el.classList.add('scanning'); }, d * 60);
        setTimeout(()=>{ el.classList.remove('scanning'); el.classList.add('done'); }, d * 60 + 900);
      })(cell, c - cellIdx);
      delay++;
    }
    cellIdx = endCell;

    // Progress bar
    const pct = Math.round(((stepIdx + 1) / steps.length) * 100);
    const fill = document.getElementById('progress-fill');
    if(fill) fill.style.width = pct + '%';

    stepIdx++;
    if(stepIdx >= steps.length){
      clearInterval(iv);
      // Complete all logs
      setTimeout(()=>{
        document.querySelectorAll('.log-list .active-step').forEach(e=>{ e.classList.remove('active-step'); e.classList.add('done'); });
        const lbl2 = document.getElementById('processing-label');
        if(lbl2) lbl2.textContent = 'Processamento concluído ✓';
      }, 800);
      setTimeout(()=>{
        setStageEnabled('checkpoint');
        goStage('checkpoint');
        toast('37 fotos representativas agrupadas de 342 recebidas. Confirme as unidades para continuar.');
      }, 1800);
    }
  }, 1100);
}

/* ---------- 03 CHECKPOINT ---------- */
function trueUnitBoundaries(){
  const b = [];
  for(let i=1;i<PHOTOS.length;i++){
    if(PHOTOS[i].apt !== PHOTOS[i-1].apt) b.push(i);
  }
  return b;
}

function renderCheckpoint(main){
  const boundaries = trueUnitBoundaries();
  const confirmedSuggested = boundaries.filter(i=> STATE.confirmedCheckpoints.has(i)).length;

  let strip = '';
  PHOTOS.forEach((p, i)=>{
    strip += `<div class="ckpt-thumb"><img src="${p.img}" alt=""></div>`;
    if(i < PHOTOS.length - 1){
      const idx = i + 1;
      const isSuggested = boundaries.includes(idx);
      const isConfirmed = STATE.confirmedCheckpoints.has(idx);
      strip += `
        <div class="ckpt-divider ${isSuggested?'suggested':''} ${isConfirmed?'confirmed':''}" data-index="${idx}">
          <div class="line"></div>
          <button class="ckpt-btn">${isConfirmed ? '✓' : (isSuggested ? '!' : '+')}</button>
          <div class="ckpt-tooltip">${isConfirmed ? 'Nova unidade confirmada — clique para desfazer' : (isSuggested ? 'IA sugere nova unidade aqui' : 'Marcar nova unidade aqui')}</div>
        </div>
      `;
    }
  });

  main.innerHTML = `
    <div class="stage-enter">
      <div class="stage-head stage-enter-child">
        <h2>Identificação de unidades</h2>
        <p>A separação por ambiente é automática, mas diferenciar "apartamento 101" de "apartamento 102" depende de um sinal que a foto sozinha não dá — os acabamentos costumam ser idênticos. O Traço sugere onde uma unidade termina e a próxima começa; confirme ou ajuste os pontos abaixo.</p>
      </div>
      <div class="ckpt-legend stage-enter-child">
        <span><span class="ckpt-swatch" style="background:var(--blueprint-soft); border:1px solid var(--blueprint);"></span>Sugestão da IA (mudança brusca de ambiente + salto de horário)</span>
        <span><span class="ckpt-swatch" style="background:var(--redline);"></span>Unidade confirmada</span>
        <span><span class="ckpt-swatch" style="background:var(--surface); border:1px solid var(--line-strong);"></span>Marcação manual</span>
      </div>
      <div class="ckpt-strip stage-enter-child">${strip}</div>
      <div class="ckpt-status stage-enter-child">
        <span class="mono">${confirmedSuggested} de ${boundaries.length} sugestões da IA confirmadas · ${STATE.confirmedCheckpoints.size} checkpoints no total</span>
        <button class="btn btn-primary" id="btn-confirm-units">Confirmar unidades e organizar</button>
      </div>
      ${confirmedSuggested < boundaries.length ? '<div class="ckpt-warn stage-enter-child">Ainda há sugestões da IA não confirmadas. Sem confirmação, fotos de unidades diferentes podem ficar misturadas no mesmo apartamento.</div>' : ''}
    </div>
  `;

  document.querySelectorAll('.ckpt-divider').forEach(div=>{
    div.addEventListener('click', ()=>{
      const idx = parseInt(div.dataset.index, 10);
      if(STATE.confirmedCheckpoints.has(idx)) STATE.confirmedCheckpoints.delete(idx);
      else STATE.confirmedCheckpoints.add(idx);
      renderCheckpoint(main);
    });
  });

  document.getElementById('btn-confirm-units').addEventListener('click', ()=>{
    if(confirmedSuggested < boundaries.length){
      toast(`Faltam ${boundaries.length - confirmedSuggested} sugestões para confirmar — prosseguindo mesmo assim.`);
    } else {
      toast('Unidades confirmadas. Organizando por apartamento e ambiente.');
    }
    setStageEnabled('organize');
    goStage('organize');
  });
}

function renderOrgMain(){

  let html = '';
  apts.forEach(apt=>{

      html += `

    t.addEventListener('dragstart', e=> e.dataTransfer.setData('text/plain', t.dataset.id));

  slot.querySelectorAll('.room-section').forEach(sec=>{

function currentPhoto(){ return PHOTOS.find(p=>p.id===STATE.currentMarkupId); }

function setupCanvas(){
  const canvas = document.getElementById('mk-canvas');
  if(!canvas) return;
  canvasCtx = canvas.getContext('2d');
  const p = currentPhoto();
  if(!p) return;
  baseImg = new Image();
  baseImg.onload = redrawCanvas;
  baseImg.src = p.img;

  canvas.onmousedown = (e)=>{
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    startX = (e.clientX - rect.left) * scaleX;
    startY = (e.clientY - rect.top) * scaleY;
    if(STATE.currentTool === 'text'){
      const txt = prompt('Texto da marcação:');
      if(txt){ currentPhoto().annotations.push({type:'text', x:startX, y:startY, text:txt}); redrawCanvas(); }
      return;
    }
    drawing = true;
  };
  canvas.onmousemove = (e)=>{
    if(!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX, y = (e.clientY - rect.top) * scaleY;
    redrawCanvas();
    drawShapePreview(STATE.currentTool, startX, startY, x, y);
  };
  const commitShape = (e)=>{
    if(!drawing) return;
    drawing = false;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX, y = (e.clientY - rect.top) * scaleY;
    if(Math.abs(x-startX) > 4 || Math.abs(y-startY) > 4){
      currentPhoto().annotations.push({type:STATE.currentTool, x1:startX, y1:startY, x2:x, y2:y});
    }
    redrawCanvas();
  };
  canvas.onmouseup = commitShape;
  canvas.onmouseleave = (e)=>{ if(drawing) commitShape(e); };
}

function drawShapePreview(tool, x1,y1,x2,y2){
  drawShape(canvasCtx, {type:tool, x1,y1,x2,y2});
}

function drawShape(ctx, s){
  ctx.strokeStyle = '#B23A2E';
  ctx.fillStyle = '#B23A2E';
  ctx.lineWidth = 3;
  if(s.type === 'circle'){
    const rx = Math.abs(s.x2-s.x1)/2, ry = Math.abs(s.y2-s.y1)/2;
    const cx = (s.x1+s.x2)/2, cy=(s.y1+s.y2)/2;
    ctx.beginPath(); ctx.ellipse(cx,cy,Math.max(rx,8),Math.max(ry,8),0,0,2*Math.PI); ctx.stroke();
  } else if(s.type === 'rect'){
    ctx.strokeRect(Math.min(s.x1,s.x2), Math.min(s.y1,s.y2), Math.abs(s.x2-s.x1), Math.abs(s.y2-s.y1));
  } else if(s.type === 'arrow'){
    ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke();
    const angle = Math.atan2(s.y2-s.y1, s.x2-s.x1);
    ctx.beginPath();
    ctx.moveTo(s.x2, s.y2);
    ctx.lineTo(s.x2 - 14*Math.cos(angle-0.4), s.y2 - 14*Math.sin(angle-0.4));
    ctx.lineTo(s.x2 - 14*Math.cos(angle+0.4), s.y2 - 14*Math.sin(angle+0.4));
    ctx.closePath(); ctx.fill();
  } else if(s.type === 'text'){
    ctx.font = 'bold 18px IBM Plex Mono, monospace';
    ctx.fillText(s.text, s.x, s.y);
  }
}

function redrawCanvas(){
  const canvas = document.getElementById('mk-canvas');
  if(!canvas || !canvasCtx) return;
  canvasCtx.clearRect(0,0,canvas.width,canvas.height);
  if(baseImg && baseImg.complete) canvasCtx.drawImage(baseImg, 0,0,canvas.width,canvas.height);
  const p = currentPhoto();
  if(p) p.annotations.forEach(a=> drawShape(canvasCtx, a));
}

function generateCaption(){
  const p = currentPhoto();
  const rt = REPORT_TYPES[STATE.reportType] || REPORT_TYPES.cautelar;
  const firstField = rt.fields[0];
  const obsInput = document.getElementById(firstField.id+'-input');
  const locInput = document.getElementById('loc-input') || document.getElementById((rt.fields[1]?.id||'loc')+'-input');
  const obs = obsInput ? obsInput.value.trim() : '';
  const loc = locInput ? locInput.value.trim() : '';
  const out = document.getElementById('caption-text');

  if(!p || !p.annotations.length){
    out.textContent = 'Marque a ocorrência na foto antes de gerar a legenda.';
    return;
  }
  if(!obs){
    out.textContent = `Preencha o campo "${firstField.label}" para a IA compor a legenda.`;
    return;
  }

  // Show scanning animation on the last annotation
  const ann = p.annotations[p.annotations.length-1];
  if(ann) animateScan(ann);

  out.textContent = '⏳ Analisando região marcada...';

  setTimeout(()=>{
    const caption = rt.caption(obs, loc, ROOM_META[p.room].label, p.apt, STATE.severity);
    out.textContent = caption;
    p.caption = caption;
    p.marked = true;
    p.severity = STATE.severity;

    // Save to history for reuse
    STATE.captionHistory.push({ obs, loc, text: caption, room: p.room, apt: p.apt });
    if(STATE.captionHistory.length > 6) STATE.captionHistory.shift();

    updateSideStats();
    const item = document.querySelector(`#mk-list [data-id="${p.id}"]`);
    if(item && !item.querySelector('.ok')){
      const ok = document.createElement('span'); ok.className='ok'; ok.title=`Severidade: ${STATE.severity}`; ok.textContent='✓';
      item.appendChild(ok);
    }

    // Show recommendation button
    const btnRec = document.getElementById('btn-gen-rec');
    if(btnRec) btnRec.style.display = 'flex';

    toast('✦ Legenda gerada — área marcada analisada pela IA.');
  }, 900);
}

function animateScan(ann){
  const canvas = document.getElementById('mk-canvas');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  let alpha = 0; let rising = true;
  const iv = setInterval(()=>{
    redrawCanvas();
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#E8B84B'; ctx.lineWidth = 4;
    ctx.shadowColor = '#E8B84B'; ctx.shadowBlur = 14;
    if(ann.type==='circle'){
      const rx=Math.abs(ann.x2-ann.x1)/2, ry=Math.abs(ann.y2-ann.y1)/2;
      const cx=(ann.x1+ann.x2)/2, cy=(ann.y1+ann.y2)/2;
      ctx.beginPath(); ctx.ellipse(cx,cy,Math.max(rx+8,16),Math.max(ry+8,16),0,0,2*Math.PI); ctx.stroke();
    } else if(ann.type==='rect'){
      ctx.strokeRect(Math.min(ann.x1,ann.x2)-6,Math.min(ann.y1,ann.y2)-6,Math.abs(ann.x2-ann.x1)+12,Math.abs(ann.y2-ann.y1)+12);
    } else {
      ctx.beginPath(); ctx.moveTo(ann.x1,ann.y1); ctx.lineTo(ann.x2,ann.y2); ctx.stroke();
    }
    ctx.restore();
    if(rising){ alpha+=0.08; if(alpha>=1) rising=false; }
    else { alpha-=0.08; if(alpha<=0) clearInterval(iv); }
  }, 28);
}

function generateRecommendation(){
  const p = currentPhoto();
  const rt = REPORT_TYPES[STATE.reportType] || REPORT_TYPES.cautelar;
  const obsInput = document.getElementById(rt.fields[0].id+'-input');
  const obs = (obsInput ? obsInput.value.trim() : '').toLowerCase();
  const recOut = document.getElementById('rec-out');
  const recText = document.getElementById('rec-text');
  if(!recOut || !recText) return;

  let recs = rt.recommendations.default || ['Monitorar evolução', 'Avaliar necessidade de intervenção'];
  for(const key of Object.keys(rt.recommendations)){
    if(key !== 'default' && obs.includes(key.toLowerCase())){
      recs = rt.recommendations[key];
      break;
    }
  }

  const urgency = STATE.severity==='grave' ? '⚠️ Urgente — ' : STATE.severity==='media' ? '📋 A curto prazo — ' : '🔧 Preventivo — ';
  const chosen = recs[Math.floor(Math.random()*recs.length)];
  recText.textContent = urgency + chosen;
  recOut.style.display = 'block';
  if(p) p.recommendation = recText.textContent;
  toast('Recomendação técnica gerada.');
}

  marked.forEach(p=>{
    const s = p.severity||'media';
    sevCounts[s] = (sevCounts[s]||0)+1;
    if(p.caption){

      <div class="stage-enter-child">
        ${marked.length ? body : '<p style="color:var(--graphite);">Nenhuma foto marcada ainda — volte à etapa de marcação.</p>'}
      </div>
    </div>
  `;

  ['exp-docx','exp-pdf','exp-zip'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener('click', ()=>toast('Gerando arquivo... (demonstração — sem exportação real)'));
  });
}


/* =========================================================
   INIT
   ========================================================= */
initTheme();
setStageEnabled('upload');
goStage('upload');
</script>
