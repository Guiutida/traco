services:
  web:
    image: nginx:alpine
    expose:
      - "80"
    volumes:
      - ./traco-demo.html:/usr/share/nginx/html/index.html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.services.tracoapp.loadbalancer.server.port=80
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  coolify:
    external: true
