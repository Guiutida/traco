services:
  web:
    image: python:3.12-alpine
    working_dir: /app
    command: python3 -m http.server 3000
    expose:
      - "3000"
    volumes:
      - ./traco-demo.html:/app/index.html:ro
    networks:
      - coolify
    labels:
      - traefik.enable=true
      - traefik.http.routers.traco-jr.rule=Host(`jr-engenharia-poc.tecmash.com.br`)
      - traefik.http.routers.traco-jr.entrypoints=http
      - traefik.http.services.traco-jr.loadbalancer.server.port=3000
    restart: unless-stopped

networks:
  coolify:
    external: true

